<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>L.I.E Login</title>
</head>
<body>
    <main class="card">
        <div class="introducao">
            <h1>Project Lazarus</h1>
            <h2>Bem-vindo ao Project Lazarus!</h2>
            <p>Insira seu login e senha</p>
        </div>
        <div class="formulario">
            <form action="" method="post">
                <label for="usuario">Usuario:</label>
                <input type="text" id="usuario" name="usuario" required>
                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" required>
                <button type="submit">Entrar</button>
            </form>
        </div>
        <div class="links">
            <ul>
                <li><a href="#">Esqueceu a senha?</a></li>
                <li>Nao tem uma conta? Crie ela aqui: <a href="#">Criar nova conta</a></li>
            </ul>
        </div>
    </main>
</body>
</html>
